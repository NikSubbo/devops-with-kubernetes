apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-output-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-output
  template:
    metadata:
      labels:
        app: log-output
    spec:
      volumes:
        - name: shared-image
          emptyDir: {}
      containers:
        - name: log-output-add
          image: niksubbo/log-output:e41c82d0dde84da4d164c0d63bef85c706587f85
          volumeMounts:
            - name: shared-image
              mountPath: /app/files
        - name: log-output-get
          image: niksubbo/log-output:e41c82d0dde84da4d164c0d63bef85c706587f85
          volumeMounts:
            - name: shared-image
              mountPath: /app/files
