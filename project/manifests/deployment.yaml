apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-app
  template:
    metadata:
      labels:
        app: todo-app
    spec:
      containers:
        - name: todo-app
          image: niksubbo/todo-app:f39b71bc26b602f7f98c66aa7563d0e3e6a345d8
          env:
            - name: GREETING
              value: "Yo! What's up?"
            - name: PORT
              value: "5000"
