apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-app
  template:
    metadata:
      labels:
        app: todo-app
    spec:
      volumes:
        - name: shared-pvc
          persistentVolumeClaim:
            claimName: project-pv-claim
      containers:
        - name: todo-app
          image: niksubbo/todo-app:4e2bca634968437828025d8674f2741ed5ea8f81
          env:
            - name: PORT
              value: "5000"
          volumeMounts:
            - name: shared-pvc
              mountPath: /app/files
