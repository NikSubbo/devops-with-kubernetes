apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-app
  template:
    metadata:
      labels:
        app: todo-app
    spec:
      volumes:
        - name: shared-pvc
          persistentVolumeClaim:
            claimName: project-pv-claim
      containers:
        - name: todo-app
          image: niksubbo/todo-app:74b9e0055204733a6e3a3fe5e2b8b8cf81194f4e
          env:
            - name: PORT
              value: "5000"
          volumeMounts:
            - name: shared-pvc
              mountPath: /app/files
